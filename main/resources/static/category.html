<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #00796b;
            color: white;
            text-align: center;
            padding: 25px 0;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 700px;
            margin: 30px auto 50px auto;
            background-color: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        h3 {
            text-align: center;
            color: #004d40;
            margin-bottom: 25px;
        }

        input {
            display: block;
            width: 95%;
            margin: 10px 0;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin: 5px 5px 5px 0;
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #00796b;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #004d40;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #00796b;
            color: white;
        }

        td button {
            background-color: green;
            padding: 5px 10px;
            font-size: 0.9em;
        }

        td button.delete-btn {
            background-color: #d32f2f;
        }

        td button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <header>Category Management</header>

    <div class="container">

        <h3>Add / Edit Category</h3>

        <input id="name" placeholder="Category Name">
        <input id="desc" placeholder="Description">
        <input id="createdBy" placeholder="Created By">

        <br>

        <button onclick="saveCategory()">Add</button>
        <button onclick="loadCategories()">View Categories</button>

    </div>

    <table id="categoryTable">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Created By</th>
            <th>Actions</th>
        </tr>
    </table>

    <script>
        function saveCategory() {
            let category = {
                categoryName: document.getElementById("name").value,
                description: document.getElementById("desc").value,
                createdBy: document.getElementById("createdBy").value,
                active: true
            };

            fetch("/categories", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(category)
            })
            .then(res => res.json())
            .then(data => {
                alert("Category Added");
                resetForm();
                loadCategories();
            });
        }

        function loadCategories() {
            fetch("/categories")
            .then(res => res.json())
            .then(data => {
                let table = document.getElementById("categoryTable");
                table.innerHTML = `
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Created By</th>
                        <th>Actions</th>
                    </tr>
                `;
                data.data.forEach(cat => {
                    table.innerHTML += `
                        <tr>
                            <td>${cat.categoryId}</td>
                            <td>${cat.categoryName}</td>
                            <td>${cat.description}</td>
                            <td>${cat.createdBy}</td>
                            <td>
                                <button onclick="editCategory(${cat.categoryId})">Edit</button>
                                <button class="delete-btn" onclick="deleteCategory(${cat.categoryId})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function deleteCategory(id) {
            fetch("/categories/" + id, { method: "DELETE" })
            .then(res => res.json())
            .then(data => {
                alert("Category Deleted");
                loadCategories();
            });
        }

        function editCategory(id) {
            fetch("/categories/" + id)
            .then(res => res.json())
            .then(data => {
                if (data.data) {
                    document.getElementById("name").value = data.data.categoryName;
                    document.getElementById("desc").value = data.data.description;
                    document.getElementById("createdBy").value = data.data.createdBy;

                    const btn = document.querySelector("button[onclick='saveCategory()']");
                    btn.textContent = "Update";
                    btn.onclick = function() { updateCategory(id); }
                } else {
                    alert("Category not found!");
                }
            });
        }

        function updateCategory(id) {
            let category = {
                categoryId: id,
                categoryName: document.getElementById("name").value,
                description: document.getElementById("desc").value,
                createdBy: document.getElementById("createdBy").value,
                active: true
            };

            fetch("/categories", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(category)
            })
            .then(res => res.json())
            .then(data => {
                alert("Category Updated Successfully");
                resetForm();
                loadCategories();
            });
        }

        function resetForm() {
            document.getElementById("name").value = '';
            document.getElementById("desc").value = '';
            document.getElementById("createdBy").value = '';

            const btn = document.querySelector("button[onclick^='updateCategory'], button[onclick='saveCategory()']");
            btn.textContent = "Add";
            btn.onclick = saveCategory;
        }

        window.onload = loadCategories;
    </script>

</body>
</html>
