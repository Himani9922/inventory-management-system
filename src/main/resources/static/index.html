<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory System</title>
    <!-- Using Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #00796b;
            color: white;
            text-align: center;
            padding: 25px 0;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #004d40;
            margin: 40px 0 30px 0;
            font-size: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .card {
            background-color: white;
            border-radius: 15px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            cursor: pointer;
            font-size: 1.2rem;
            color: #004d40;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 14px 20px rgba(0, 0, 0, 0.2);
            background-color: #e0f2f1;
        }

        .card .material-icons {
            font-size: 50px;
            margin-bottom: 15px;
            color: #00796b;
            transition: color 0.3s;
        }

        .card:hover .material-icons {
            color: #004d40;
        }

        @media (max-width: 600px) {
            h2 {
                font-size: 1.5rem;
            }
            .card {
                padding: 25px 15px;
                font-size: 1rem;
            }
            .card .material-icons {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>
    <header>Smart Inventory Management System</header>

    <h2>Dashboard</h2>
    <div class="container">
        <div class="card" onclick="location.href='category.html'">
            <span class="material-icons">category</span>
            <div>Category Management</div>
        </div>
        <div class="card" onclick="location.href='supplier.html'">
            <span class="material-icons">local_shipping</span>
            <div>Supplier Management</div>
        </div>
        <div class="card" onclick="location.href='product.html'">
            <span class="material-icons">inventory_2</span>
            <div>Product Management</div>
        </div>
        <div class="card" onclick="location.href='transaction.html'">
            <span class="material-icons">swap_horiz</span>
            <div>Stock Transactions</div>
        </div>
    </div>
</body>

</html>
