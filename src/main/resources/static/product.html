<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #00796b;
            color: white;
            text-align: center;
            padding: 25px 0;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 700px;
            margin: 30px auto 50px auto;
            background-color: white;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        h3 {
            text-align: center;
            color: #004d40;
            margin-bottom: 25px;
        }

        input {
            display: block;
            width: 95%;
            margin: 10px 0;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin: 5px 5px 5px 0;
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #00796b;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background-color: #004d40;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #00796b;
            color: white;
        }

        td button {
            background-color: green;
            padding: 5px 10px;
            font-size: 0.9em;
        }

        td button.delete-btn {
            background-color: #d32f2f;
        }

        td button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <header>Product Management</header>

    <div class="container">

        <h3>Add / Edit Product</h3>

        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="quantity" placeholder="Quantity">
        <input id="categoryId" placeholder="Category ID">
        <input id="supplierId" placeholder="Supplier ID">

        <br>

        <button onclick="saveProduct()">Add</button>
        <button onclick="loadProducts()">View Products</button>

    </div>

    <table id="productTable">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Category ID</th>
            <th>Supplier ID</th>
            <th>Actions</th>
        </tr>
    </table>

    <script>
        function saveProduct() {
            let product = {
                prodName: document.getElementById("name").value,
                price: document.getElementById("price").value,
                quantity: document.getElementById("quantity").value,
                category: { categoryId: document.getElementById("categoryId").value },
                supplier: { supplierId: document.getElementById("supplierId").value }
            };

            fetch("/products", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            })
            .then(res => res.json())
            .then(data => {
                alert("Product Added");
                resetForm();
                loadProducts();
            });
        }

        function loadProducts() {
            fetch("/products")
            .then(res => res.json())
            .then(data => {
                let table = document.getElementById("productTable");
                table.innerHTML = `
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Category ID</th>
                        <th>Supplier ID</th>
                        <th>Actions</th>
                    </tr>
                `;
                data.data.forEach(p => {
                    table.innerHTML += `
                        <tr>
                            <td>${p.prodId}</td>
                            <td>${p.prodName}</td>
                            <td>${p.price}</td>
                            <td>${p.quantity}</td>
                            <td>${p.category ? p.category.categoryId : ''}</td>
                            <td>${p.supplier ? p.supplier.supplierId : ''}</td>
                            <td>
                                <button onclick="editProduct(${p.prodId})">Edit</button>
                                <button class="delete-btn" onclick="deleteProduct(${p.prodId})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function deleteProduct(id) {
            fetch("/products/" + id, { method: "DELETE" })
            .then(res => res.json())
            .then(data => {
                alert("Product Deleted");
                loadProducts();
            });
        }

        function editProduct(id) {
            fetch("/products/" + id)
            .then(res => res.json())
            .then(data => {
                if (data.data) {
                    document.getElementById("name").value = data.data.prodName;
                    document.getElementById("price").value = data.data.price;
                    document.getElementById("quantity").value = data.data.quantity;
                    document.getElementById("categoryId").value = data.data.category ? data.data.category.categoryId : '';
                    document.getElementById("supplierId").value = data.data.supplier ? data.data.supplier.supplierId : '';

                    const btn = document.querySelector("button[onclick='saveProduct()']");
                    btn.textContent = "Update";
                    btn.onclick = function() { updateProduct(id); }
                } else {
                    alert("Product not found!");
                }
            });
        }

        function updateProduct(id) {
            let product = {
                prodId: id,
                prodName: document.getElementById("name").value,
                price: document.getElementById("price").value,
                quantity: document.getElementById("quantity").value,
                category: { categoryId: document.getElementById("categoryId").value },
                supplier: { supplierId: document.getElementById("supplierId").value }
            };

            fetch("/products", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)
            })
            .then(res => res.json())
            .then(data => {
                alert("Product Updated Successfully");
                resetForm();
                loadProducts();
            });
        }

        function resetForm() {
            document.getElementById("name").value = '';
            document.getElementById("price").value = '';
            document.getElementById("quantity").value = '';
            document.getElementById("categoryId").value = '';
            document.getElementById("supplierId").value = '';

            const btn = document.querySelector("button[onclick^='updateProduct'], button[onclick='saveProduct()']");
            btn.textContent = "Add";
            btn.onclick = saveProduct;
        }

        window.onload = loadProducts;
    </script>

</body>
</html>
